<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals that can't refuse</title>
    <style>
        /* BUG FIX: Prevent horizontal scroll from large fonts/marquee */
        html, body {
            overflow-x: hidden;
            width: 100%;
            background-color: #f0f0f0;
            color: #000;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        body {
            padding: 20px;
        }

        /* MARQUEE BUG FIX: Ensure it stays full width */
        .marquee-container {
            background: #000;
            color: #fff;
            padding: 10px 0;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            width: 100vw;
            margin-left: -20px; /* Offset body padding */
        }

        header {
            border: 8px solid #000;
            background: #ffde03;
            padding: 40px 20px;
            margin-bottom: 40px;
            box-shadow: 15px 15px 0px #000;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem); /* BUG FIX: Better scaling on mobile */
            text-transform: uppercase;
            line-height: 0.9;
            margin: 0;
        }

        .tagline {
            font-weight: bold;
            font-size: 1.2rem;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 5px 15px;
            margin-top: 15px;
        }

        .deal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: #fff;
            border: 5px solid #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 0px #000;
            transition: transform 0.05s linear;
        }

        .product-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 14px 14px 0px #ff0055;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1; /* BUG FIX: Keeps all cards same size regardless of image */
            background: #eee;
            border: 3px solid #000;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            min-height: 3.2em; /* Keeps buttons aligned */
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: #ff0055;
            margin-top: auto; /* Pushes price/button to bottom */
            margin-bottom: 15px;
        }

        .buy-btn {
            display: block;
            text-align: center;
            background: #000;
            color: #fff;
            padding: 15px;
            text-decoration: none;
            font-weight: 900;
            border: 3px solid #000;
        }

        .buy-btn:hover {
            background: #fff;
            color: #000;
        }

        footer {
            margin-top: 60px;
            border-top: 10px solid #000;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee scrollamount="12">URGENT DEALS // NO REFUNDS // TAKE THE OFFER OR LEAVE IT // AS SEEN ON THE STREETS</marquee>
    </div>

    <header>
        <h1>DEALS THAT CAN'T REFUSE</h1>
        <div class="tagline">The Consigliere's Top Picks</div>
    </header>

    <main id="deal-grid" class="deal-grid">
        <!-- JS handles rendering to prevent HTML duplication bugs -->
    </main>

    <footer>
        <p><strong>DISCLAIMER:</strong> AS AN AMAZON ASSOCIATE I EARN FROM QUALIFYING PURCHASES. YOU PAY THE SAME, I GET A CUT. THAT'S THE DEAL.</p>
    </footer>

    <script>
        // UPDATE YOUR PRODUCTS HERE
        const products = [
            {
                title: "Ultra-Noise Headphones",
                desc: "Block out the world.",
                price: "$199.99",
                image: "https://via.placeholder.com/400x400?text=HEADPHONES",
                url: "YOUR_LINK_1"
            },
            {
                title: "Mechanical Keyboard",
                desc: "Loud enough to be a weapon.",
                price: "$85.00",
                image: "https://via.placeholder.com/400x400?text=KEYBOARD",
                url: "YOUR_LINK_2"
            },
            {
                title: "Smart Watch Pro",
                desc: "Time is money. Don't waste it.",
                price: "$249.00",
                image: "https://via.placeholder.com/400x400?text=WATCH",
                url: "YOUR_LINK_3"
            },
            {
                title: "Black Coffee Maker",
                desc: "Stronger than your willpower.",
                price: "$45.50",
                image: "https://via.placeholder.com/400x400?text=COFFEE",
                url: "YOUR_LINK_4"
            }
        ];

        const grid = document.getElementById('deal-grid');

        // BUG FIX: Added security rel="noopener" and handled empty data
        grid.innerHTML = products.map(p => `
            <article class="product-card">
                <img src="${p.image}" alt="${p.title}" class="product-image" loading="lazy">
                <h2 class="product-title">${p.title}</h2>
                <p>${p.desc}</p>
                <div class="price">${p.price}</div>
                <a href="${p.url}" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="buy-btn">GET IT NOW</a>
            </article>
        `).join('');
    </script>
</body>
</html>
