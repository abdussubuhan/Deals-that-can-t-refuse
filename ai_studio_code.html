<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals that can't refuse</title>
    <style>
        /* CORE BRUTALIST THEME */
        :root {
            --bg: #e0e0e0;
            --yellow: #ffde03;
            --pink: #ff0055;
            --black: #000000;
            --white: #ffffff;
            --border: 5px solid #000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--black);
            line-height: 1.3;
            padding: 15px;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        /* MARQUEE */
        .scroller {
            background: var(--black);
            color: var(--white);
            padding: 10px 0;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border: var(--border);
        }

        /* HEADER */
        header {
            background: var(--yellow);
            border: 8px solid var(--black);
            padding: 30px 15px;
            margin-bottom: 30px;
            box-shadow: 12px 12px 0px var(--black);
        }

        h1 {
            font-size: clamp(2rem, 10vw, 5rem);
            text-transform: uppercase;
            line-height: 0.85;
            word-wrap: break-word;
        }

        .tagline {
            display: inline-block;
            background: var(--black);
            color: var(--white);
            padding: 5px 10px;
            margin-top: 15px;
            font-weight: bold;
        }

        /* GRID */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .deal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* PRODUCT CARD */
        .product-card {
            background: var(--white);
            border: var(--border);
            padding: 20px;
            box-shadow: 8px 8px 0px var(--black);
            display: flex;
            flex-direction: column;
            transition: all 0.1s ease;
        }

        .product-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--pink);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 3px solid var(--black);
            margin-bottom: 15px;
            background: #ccc;
        }

        .product-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            min-height: 3em; /* Vertical alignment */
        }

        .price {
            font-size: 2rem;
            font-weight: 900;
            color: var(--pink);
            margin-bottom: 15px;
        }

        .buy-btn {
            background: var(--black);
            color: var(--white);
            text-decoration: none;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border: 3px solid var(--black);
            margin-top: auto; /* Push to bottom */
        }

        .buy-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        /* FOOTER */
        footer {
            margin-top: 50px;
            padding: 30px 0;
            border-top: 10px solid var(--black);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            header { border-width: 5px; box-shadow: 6px 6px 0px var(--black); }
            .product-card { box-shadow: 5px 5px 0px var(--black); }
        }
    </style>
</head>
<body>

    <div class="scroller">
        <marquee scrollamount="10">URGENT DEALS // TAKE THE OFFER // LIMITED STOCK // NO COMPLAINTS // BUY NOW OR REGRET LATER</marquee>
    </div>

    <div class="container">
        <header>
            <h1>DEALS THAT CAN'T REFUSE</h1>
            <div class="tagline">The Consigliere's Top Picks</div>
        </header>

        <main id="deal-grid" class="deal-grid">
            <!-- PRODUCTS LOADED BY JAVASCRIPT BELOW -->
        </main>

        <footer>
            <p><strong>Disclaimer:</strong> As an Amazon Associate, I earn from qualifying purchases. This keeps the lights on. No apologies. &copy; 2026 DEALS THAT CAN'T REFUSE.</p>
        </footer>
    </div>

    <script>
        // DATA MANAGEMENT: ADD OR CHANGE PRODUCTS HERE
        const DEALS = [
            {
                title: "Noise Cancelling Gear",
                price: "$199",
                image: "https://via.placeholder.com/400x400?text=AUDIO",
                url: "#" // PASTE AMAZON LINK HERE
            },
            {
                title: "Mechanical Click-Clack",
                price: "$85",
                image: "https://via.placeholder.com/400x400?text=KEYS",
                url: "#" // PASTE AMAZON LINK HERE
            },
            {
                title: "The Don's Watch",
                price: "$249",
                image: "https://via.placeholder.com/400x400?text=WATCH",
                url: "#" // PASTE AMAZON LINK HERE
            },
            {
                title: "Midnight Espresso",
                price: "$45",
                image: "https://via.placeholder.com/400x400?text=COFFEE",
                url: "#" // PASTE AMAZON LINK HERE
            }
        ];

        const grid = document.getElementById('deal-grid');

        // FUNCTION TO RENDER CARDS
        function loadDeals() {
            grid.innerHTML = DEALS.map(item => `
                <article class="product-card">
                    <img src="${item.image}" alt="${item.title}" class="product-image">
                    <h2 class="product-title">${item.title}</h2>
                    <div class="price">${item.price}</div>
                    <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="buy-btn">GET IT NOW</a>
                </article>
            `).join('');
        }

        // INITIALIZE
        loadDeals();
    </script>
</body>
</html>
